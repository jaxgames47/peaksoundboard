<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaxon Sounds - Established 2026</title>
    <style>
        :root {
            --bg-color: #ffffff; /* New White Background */
            --text-color: #2c3e50; /* Softer, darker grey text */
            --button-color: #ecf0f1; /* Very subtle grey for button shape */
            --button-hover: #bdc3c7; /* Subtle hover effect */
            --accent-color: #34495e; /* Logo text color */
        }

    /* Force the page to allow scrolling and take up full height */
    html, body {
        min-height: 100%;
        height: auto;
        overflow-y: auto; 
    }

    body { 
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Cleaner, professional font */
        text-align: center; 
        background-color: var(--bg-color); /* Updated BG */
        color: var(--text-color); /* Updated text color */
        margin: 0;
        padding: 40px 20px 100px 20px; /* Refined padding */
    }

    .container {
        position: relative;
        z-index: 10;
        height: auto;
        max-width: 800px; /* Centered layout */
        margin: 0 auto;
    }

    header {
        margin-bottom: 50px;
        border-bottom: 2px solid #eee;
        padding-bottom: 30px;
    }

    .logo-img {
        width: 150px; /* Slightly smaller, refined size */
        height: 150px;
        border-radius: 50%;
        border: 4px solid #eee; /* Professional border */
        box-shadow: 0 4px 8px rgba(0,0,0,0.05); /* Soft shadow */
        object-fit: cover;
    }

    h1 {
        font-weight: 300; /* Lighter weight for refinement */
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent-color);
        margin-top: 20px;
        margin-bottom: 5px;
    }

    .est-tag {
        font-size: 12px;
        color: #7f8c8d;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); /* Responsive grid */
        gap: 25px;
        margin: 30px auto; 
    }

    /* Layout container for button + text */
    .sound-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #fff;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #eee;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .sound-item:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 12px rgba(0,0,0,0.05);
    }

    /* New Button setup - minimalist circle */
    button { 
        width: 70px; /* Slightly smaller button */
        height: 70px; 
        border-radius: 50%; 
        border: 2px solid #ddd; /* Subtle border */
        background-color: var(--button-color); /* Flat, light color */
        /* background-image: removed */
        cursor: pointer;
        transition: background-color 0.2s ease, transform 0.1s ease;
        position: relative;
    }

    /* Subtle play icon hint */
    button::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 55%; /* Centered visually */
        transform: translate(-50%, -50%);
        width: 0;
        height: 0;
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
        border-left: 16px solid #95a5a6; /* Subtle grey icon */
        transition: border-left-color 0.2s ease;
    }

    button:hover {
        background-color: var(--button-hover);
    }

    button:hover::after {
        border-left-color: #fff; /* White icon on hover */
    }

    /* Small tap effect */
    button:active {
        transform: scale(0.95);
    }

    /* Text setup */
    span {
        color: var(--text-color); /* Dark text */
        font-size: 13px; /* Slightly refined size */
        font-weight: 600; /* Semi-bold */
        margin-top: 12px; 
        text-shadow: none; /* Removed shadow for cleanliness */
        text-align: center;
        text-transform: capitalize; /* Cleaner look */
        word-wrap: break-word;
        line-height: 1.3;
    }
</style>
</head>
<body>

    <div class="container">
        <header>
            <img src="peak png.png" alt="jaxon" class="logo-img">
            <h1>Jaxon Sounds</h1>
            <div class="est-tag">Est. 2014 | Optimized Archive</div>
        </header>
        
        <div class="grid">
                        <div class="sound-item">
                <button onclick="new Audio('Screen Recording 2026-03-10 221505.mp3').play()"></button>
